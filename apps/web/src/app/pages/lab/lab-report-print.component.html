<div class="no-print toolbar">
  <p-button
    label="Save PDF"
    icon="pi pi-download"
    [loading]="pdfBusy()"
    [disabled]="!record()"
    (onClick)="downloadPdf()"
  />
  <p-button
    label="Print"
    icon="pi pi-print"
    [loading]="pdfBusy()"
    [disabled]="!record()"
    (onClick)="openPdfForPrint()"
    pTooltip="Opens a PDF copy without the browser web address; print from the PDF viewer."
    tooltipPosition="bottom"
  />
  <p-button
    label="Back"
    icon="pi pi-arrow-left"
    severity="secondary"
    (onClick)="back()"
  />
</div>

@if (record(); as r) {
  <div #printRoot class="print-area life-care-slip lab-doc">
    <app-life-care-print-chrome
      [patientName]="r.patientName"
      [dateText]="printedAt() | date: 'dd/MM/yyyy'"
      [referredBy]="''"
      [patientId]="r.patientMrn"
    >
      @if (r.createdByName) {
        <div lc-after-patient class="lab-after-patient">
          <div class="lc-field-row lab-tech-line">
            <span class="lc-label">Prepared by</span>
            <span class="lc-line lc-line-fill lc-line-long">{{ r.createdByName }}</span>
          </div>
        </div>
      }

      <div class="lab-doc-body">
        <div class="lc-rule"></div>

        @if (hasRichBody()) {
          <section class="lab-rich-print" [innerHTML]="richBodyHtml()"></section>
        } @else {
          @for (f of orderedFields(r.fieldsSchema); track f.key) {
            <section class="lab-field-block">
              <h2 class="lab-field-title">{{ f.label }}</h2>
              <div class="lab-field-body">{{ fieldValue(f.key) }}</div>
            </section>
          }
        }

        <div class="lab-sig-block">
          <div class="lab-sig-line"></div>
          <div class="lab-sig-label">Radiologist / Sonologist / Technician</div>
        </div>
      </div>
    </app-life-care-print-chrome>
  </div>
}
