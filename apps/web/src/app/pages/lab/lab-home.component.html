@if (loading()) {
  <div class="lab-loading">
    <p-progressSpinner strokeWidth="4" />
    <span>Loading lab workspace…</span>
  </div>
} @else if (error(); as err) {
  <p-card header="Laboratory">
    <p class="err">{{ err }}</p>
    <p-button label="Retry" icon="pi pi-refresh" (onClick)="retry()" />
  </p-card>
} @else if (bench(); as b) {
  <div class="lab-head">
    <div>
      <h1 class="lab-title">{{ b.title }}</h1>
      <p class="lab-sub">Updated {{ b.generatedAt | date: 'medium' }}</p>
    </div>
    <div class="lab-actions">
      <p-button label="Patient lookup" icon="pi pi-users" routerLink="/patients" />
      <p-button
        label="Lab reports"
        icon="pi pi-file-edit"
        routerLink="/lab/reports"
      />
      <p-button
        label="Recent reports"
        icon="pi pi-history"
        severity="secondary"
        [outlined]="true"
        routerLink="/lab/reports/recent"
      />
    </div>
  </div>
  <p-card [header]="'Lab workspace'">
    <p class="lab-summary">{{ b.summary }}</p>
  </p-card>
}
