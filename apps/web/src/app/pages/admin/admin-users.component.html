<p-card header="Seeded users (admin)">
  <p class="hint">
    Default accounts from the API seeder. Change passwords before production.
  </p>
  <p-button
    label="Back to dashboard"
    icon="pi pi-arrow-left"
    [text]="true"
    routerLink="/admin/dashboard"
    class="mb-2"
  />
  <p-table
    [value]="rows()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '40rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Created</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-u>
      <tr>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td><p-tag [value]="u.role" /></td>
        <td>{{ u.createdAt | date: 'medium' }}</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
