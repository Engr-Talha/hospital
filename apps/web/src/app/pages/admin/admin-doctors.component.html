<p-card header="Doctors">
  <p class="hint">
    Register doctors separately from other staff. Enter their
    <strong>medical field</strong> (specialty, department, or scope of practice)
    — this is free text.
  </p>
  <div class="toolbar">
    <p-button
      label="Back to dashboard"
      icon="pi pi-arrow-left"
      [text]="true"
      routerLink="/admin/dashboard"
    />
    <p-button
      label="Staff users (non-doctors)"
      icon="pi pi-users"
      [outlined]="true"
      severity="secondary"
      routerLink="/admin/users"
    />
    <p-button
      label="Register doctor"
      icon="pi pi-user-plus"
      (onClick)="openRegister()"
    />
  </div>
  <p-table
    [value]="rows()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '44rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Medical field</th>
        <th>Registered</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.email }}</td>
        <td>{{ row.medicalField }}</td>
        <td>{{ row.createdAt | date: 'medium' }}</td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">No doctors registered yet.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog
  header="Register doctor"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '28rem' }"
  [closable]="!saving"
>
  <div class="form-stack">
    <div class="field">
      <label for="doc-name">Full name</label>
      <input
        id="doc-name"
        pInputText
        [(ngModel)]="formName"
        autocomplete="name"
      />
    </div>
    <div class="field">
      <label for="doc-email">Email (login)</label>
      <input
        id="doc-email"
        pInputText
        type="email"
        [(ngModel)]="formEmail"
        autocomplete="off"
      />
    </div>
    <div class="field">
      <label for="doc-field">Medical field</label>
      <textarea
        id="doc-field"
        pTextarea
        [(ngModel)]="formMedicalField"
        rows="3"
        class="w-full"
        placeholder="e.g. Cardiology, General medicine, Pediatrics…"
      ></textarea>
    </div>
    <div class="field">
      <label for="doc-pw">Temporary password</label>
      <p-password
        inputId="doc-pw"
        [(ngModel)]="formPassword"
        [feedback]="true"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
        autocomplete="new-password"
      />
    </div>
    <div class="field">
      <label for="doc-pw2">Confirm password</label>
      <p-password
        inputId="doc-pw2"
        [(ngModel)]="formPasswordConfirm"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
        autocomplete="new-password"
      />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      [text]="true"
      [disabled]="saving"
      (onClick)="dialogVisible = false"
    />
    <p-button
      label="Create doctor"
      icon="pi pi-check"
      [loading]="saving"
      (onClick)="submitRegister()"
    />
  </ng-template>
</p-dialog>

<p-toast />
